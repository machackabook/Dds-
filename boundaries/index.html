<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audioscope</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:#000;
color:#7cff7c;
font-family:monospace;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:16px;
cursor:pointer;
user-select:none;
}

.title{
font-size:clamp(12px,3vw,15px);
letter-spacing:0.2em;
text-transform:uppercase;
color:#00ff88;
text-shadow:0 0 8px #00ff66;
margin-bottom:10px;
}

.screen{
position:relative;
padding:16px;
border:2px solid #0f0;
background:#001000;
box-shadow:
0 0 10px #0f0,
inset 0 0 40px rgba(0,255,0,0.12);
}

#viz{
width:min(420px,82vw);
height:min(420px,82vw);
border-radius:50%;
background:#000;
border:2px solid rgba(0,255,0,0.5);
box-shadow:
0 0 30px rgba(0,255,120,0.25) inset,
0 0 12px rgba(0,255,0,0.6);
display:block;
}

.controls{
margin-top:12px;
display:flex;
flex-wrap:wrap;
gap:6px;
justify-content:center;
}

button{
background:#001400;
border:1px solid #00ff00;
color:#7cff7c;
padding:6px 10px;
cursor:pointer;
font-family:monospace;
font-size:11px;
}
button:hover{ background:#002800; }
button.active{ background:#022; }

.subs{
position:fixed;
bottom:10px;
left:0;
right:0;
margin:auto;
width:min(520px,92vw);
padding:6px 12px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:clamp(13px,3.8vw,16px);
line-height:1.35;
color:#aaffaa;
text-shadow:0 0 6px #00ff66;
background:rgba(0,20,0,0.35);
border:1px solid rgba(0,255,0,0.2);
border-radius:6px;
pointer-events:none;
min-height:2em;
}
</style>
</head>

<body>

<div class="title">Audioscope</div>

<div class="screen">
  <canvas id="viz"></canvas>
</div>

<div class="controls" id="trackButtons"></div>

<div id="subs" class="subs"></div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>

/* TRACKS */
const tracks = [
  "How_Platforms_Turn_Creators_Into_Customers",
  "Why_your_brain_believes_deepfakes",
  "The_Physics_of_Social_Escape_Velocity"
];

let trackIndex = 0;

const audio = document.getElementById("audio");
const subs  = document.getElementById("subs");
const trackButtons = document.getElementById("trackButtons");

/* AUDIO */
let ctx, analyser, data;

function initAudio(){
  if(ctx) return;
  ctx = new AudioContext();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  data = new Uint8Array(analyser.fftSize);
  const node = ctx.createMediaElementSource(audio);
  node.connect(analyser);
  analyser.connect(ctx.destination);
}

/* TRACK LOAD */
async function loadTrack(i, autoplay=false){
  trackIndex = (i + tracks.length) % tracks.length;
  const base = tracks[trackIndex];

  audio.src = base + ".mp3";
  audio.load();

  await loadVTT(base + ".vtt");

  updateButtons();

  if(autoplay){
    await audio.play();
  }
}

audio.onended = ()=> loadTrack(trackIndex+1, true);

/* BUTTONS */
tracks.forEach((t,i)=>{
  const b = document.createElement("button");
  b.textContent = t.replace(/_/g," ").slice(0,20);
  b.onclick = async e=>{
    e.stopPropagation();
    await loadTrack(i,true);
  };
  trackButtons.appendChild(b);
});

function updateButtons(){
  [...trackButtons.children].forEach((b,i)=>{
    b.classList.toggle("active", i===trackIndex);
  });
}

/* CLICK PLAY */
document.body.onclick = async ()=>{
  initAudio();
  if(ctx.state==="suspended") await ctx.resume();

  if(audio.paused){
    await loadTrack(trackIndex,true);
  }else{
    audio.pause();
  }
};

/* SUBTITLES */
let cues=[];

async function loadVTT(url){
  cues=[];
  try{
    const res = await fetch(url);
    if(!res.ok) return;
    const text = await res.text();
    const blocks = text.split(/\n{2,}/);

    for(const block of blocks){
      const lines = block.trim().split('\n');
      const ts = lines.find(l=>l.includes('-->'));
      if(!ts) continue;

      const [s,e]=ts.split('-->').map(x=>x.trim());
      const textLine = lines.slice(lines.indexOf(ts)+1).join(' ');
      cues.push({
        start: parseTime(s),
        end: parseTime(e),
        text: textLine
      });
    }
  }catch(e){ console.warn(e); }
}

function parseTime(t){
  const p=t.split(':');
  return p.length===3
    ? +p[0]*3600 + +p[1]*60 + +p[2]
    : +p[0]*60 + +p[1];
}

audio.ontimeupdate=()=>{
  const t=audio.currentTime;
  const c=cues.find(c=>t>=c.start && t<c.end);
  subs.textContent=c?c.text:"";
};

/* CANVAS */
const canvas=document.getElementById("viz");
const c=canvas.getContext("2d");
const W=300,H=300;
canvas.width=W; canvas.height=H;

let t=0;

function draw(){
  t++;

  c.fillStyle="rgba(0,5,0,0.22)";
  c.fillRect(0,0,W,H);

  let buf, len;

  if(analyser){
    analyser.getByteTimeDomainData(data);
    buf=data; len=data.length;
  }else{
    buf=new Uint8Array(512);
    for(let i=0;i<512;i++){
      buf[i]=128+Math.sin(i*0.1+t*0.03)*30;
    }
    len=512;
  }

  /* dynamic lag = fixes circle issue */
  const lag = Math.floor(len*(0.18 + Math.sin(t*0.01)*0.08));

  const cx=W/2, cy=H/2, R=W*0.4;

  c.beginPath();

  for(let i=0;i<len;i++){
    const x = cx + ((buf[i]-128)/128)*R;
    const y = cy + ((buf[(i+lag)%len]-128)/128)*R;
    if(i===0) c.moveTo(x,y);
    else c.lineTo(x,y);
  }

  c.strokeStyle="#7cff7c";
  c.lineWidth=1.4;
  c.shadowBlur=15;
  c.shadowColor="#00ff66";
  c.stroke();
  c.shadowBlur=0;

  requestAnimationFrame(draw);
}

draw();

</script>
</body>
</html>
